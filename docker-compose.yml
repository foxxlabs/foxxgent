version: '3.8'

services:
  foxxgent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foxxgent
    ports:
      - "8000:8000"
    volumes:
      - ./foxxgent.db:/app/foxxgent.db
      # Optional: Uncomment if you have a credentials.json file for OAuth
      # - ./credentials.json:/app/credentials.json:ro
    # NOTE: Create a .env file in the project root before running.
    # Copy .env.example to .env and fill in your API keys and configuration.
    env_file:
      - .env
    environment:
      - DB_PATH=foxxgent.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - foxxgent-network

networks:
  foxxgent-network:
    driver: bridge
